services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: kleinanzeigen
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: kleinanzeigen_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kleinanzeigen"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Celery Broker)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: app/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://kleinanzeigen:secret@db:5432/kleinanzeigen_ai
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_EMAIL: ${VAPID_EMAIL:-mailto:admin@example.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers --forwarded-allow-ips "*"

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: app/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://kleinanzeigen:secret@db:5432/kleinanzeigen_ai
      REDIS_URL: redis://redis:6379/0
      SYSTEM_USER_ID: ${SYSTEM_USER_ID:-1}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_EMAIL: ${VAPID_EMAIL:-mailto:admin@example.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A app.worker.celery_app worker --loglevel=info

  # Celery Beat (Scheduler)
  beat:
    build:
      context: .
      dockerfile: app/beat/Dockerfile
    environment:
      DATABASE_URL: postgresql://kleinanzeigen:secret@db:5432/kleinanzeigen_ai
      REDIS_URL: redis://redis:6379/0
      SYSTEM_USER_ID: ${SYSTEM_USER_ID:-1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A app.beat.celery_beat beat --loglevel=info --schedule /tmp/celerybeat-schedule

volumes:
  postgres_data:
