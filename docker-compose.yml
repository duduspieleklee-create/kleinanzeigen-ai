version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: kleinanzeigen
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: kleinanzeigen_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kleinanzeigen"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for Celery)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: app/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://kleinanzeigen:secret@db:5432/kleinanzeigen_ai
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: supersecretkey123
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: app/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://kleinanzeigen:secret@db:5432/kleinanzeigen_ai
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A app.worker.celery_app worker --loglevel=info

  # Celery Beat (Scheduler)
  beat:
    build:
      context: .
      dockerfile: app/beat/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A app.beat.celery_beat beat --loglevel=info

volumes:
  postgres_data:
