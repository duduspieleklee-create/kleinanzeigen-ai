# Beat must always run as a single replica to avoid duplicate scheduled tasks
replicaCount: 1

image:
  repository: kleinanzeigen-ai/beat
  pullPolicy: IfNotPresent
  tag: "latest"

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

env:
  - name: REDIS_URL
    valueFrom:
      secretKeyRef:
        name: kleinanzeigen-secrets
        key: REDIS_URL
