replicaCount: 2

image:
  repository: kleinanzeigen-ai/worker
  pullPolicy: IfNotPresent
  tag: "latest"

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

env:
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: kleinanzeigen-secrets
        key: DATABASE_URL
  - name: REDIS_URL
    valueFrom:
      secretKeyRef:
        name: kleinanzeigen-secrets
        key: REDIS_URL
