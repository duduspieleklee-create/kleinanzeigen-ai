apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    app: {{ .Release.Name }}-worker
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-worker
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - celery
            - -A
            - app.worker.celery_app
            - worker
            - --loglevel=info
          env:
            {{- toYaml .Values.env | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # Workers have no HTTP port — use process-level liveness check
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - app.worker.celery_app
                - inspect
                - ping
                - -t
                - "5"
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
