apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kleinanzeigen-worker.fullname" . }}
  labels:
    {{- include "kleinanzeigen-worker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kleinanzeigen-worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kleinanzeigen-worker.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z db 5432; do echo waiting for db; sleep 2; done;']

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          env:
            {{- toYaml .Values.env | nindent 12 }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          command: ["celery"]
          args: ["-A", "app.worker.celery_app", "worker", "--loglevel=info"]
