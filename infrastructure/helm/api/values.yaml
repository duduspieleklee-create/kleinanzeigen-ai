replicaCount: 1

image:
  repository: kleinanzeigen-ai/api
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8000

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Horizontal Pod Autoscaler
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# Ingress — set enabled: true and provide a real host before deploying
ingress:
  enabled: false
  host: kleinanzeigen-ai.example.com
  annotations:
    kubernetes.io/ingress-class: nginx

env:
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: kleinanzeigen-secrets
        key: DATABASE_URL
  - name: REDIS_URL
    valueFrom:
      secretKeyRef:
        name: kleinanzeigen-secrets
        key: REDIS_URL
  - name: SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: kleinanzeigen-secrets
        key: SECRET_KEY
  - name: GOOGLE_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: kleinanzeigen-secrets
        key: GOOGLE_CLIENT_ID
  - name: GOOGLE_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: kleinanzeigen-secrets
        key: GOOGLE_CLIENT_SECRET
  - name: ENVIRONMENT
    value: "prod"
