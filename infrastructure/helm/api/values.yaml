replicaCount: 2

image:
  repository: kleinanzeigenacrdev.azurecr.io/kleinanzeigen-ai-api
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

env:
  - name: DATABASE_URL
    value: "postgresql://kleinanzeigen:secret@your-db-server.postgres.database.azure.com:5432/kleinanzeigen_ai"
  - name: REDIS_URL
    value: "redis://your-redis.redis.cache.windows.net:6380"
  - name: SECRET_KEY
    value: "supersecretkey123"
