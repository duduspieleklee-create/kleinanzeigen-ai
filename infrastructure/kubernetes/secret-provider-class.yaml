apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: kleinanzeigen-kv
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    userAssignedIdentityID: ""                    # Leave empty when using Workload Identity
    keyvaultName: "kleinanzeigen-kv-dev"          # ← Change per environment
    objects: |
      array:
        - |
          objectName: DatabaseConnectionString
          objectType: secret
        - |
          objectName: RedisConnectionString
          objectType: secret
    tenantId: "YOUR_TENANT_ID"
