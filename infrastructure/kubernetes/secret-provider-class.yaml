apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: kleinanzeigen-kv
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    userAssignedIdentityID: ""
    keyvaultName: "kleinanzeigen-kv-dev"     # Change per environment
    objects: |
      array:
        - |
          objectName: DatabaseConnectionString
          objectType: secret
        - |
          objectName: RedisConnectionString
          objectType: secret
    tenantId: "YOUR_TENANT_ID_HERE"

  # This part creates a normal Kubernetes Secret
  secretObjects:
    - secretName: kleinanzeigen-secrets
      type: Opaque
      data:
        - objectName: DatabaseConnectionString
          key: DATABASE_URL
        - objectName: RedisConnectionString
          key: REDIS_URL
