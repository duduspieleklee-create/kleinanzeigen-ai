[pytest]
testpaths = tests
python_files = test_*.py
# Prepend the repo root to sys.path so `import app` resolves when pytest is
# invoked as the console script (CI runs `pytest -q`, which does NOT add cwd
# to sys.path the way `python -m pytest` does). Without this, conftest.py's
# `import app.api.main` raises ModuleNotFoundError: No module named 'app'.
pythonpath = .
filterwarnings =
    ignore::DeprecationWarning
