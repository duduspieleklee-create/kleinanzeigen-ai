# Production compose file for a self-managed VPS deployment.
# Unlike docker-compose.yml (dev): no bind mounts, no --reload, restart
# policies on every service, db/redis are not published to the host, and
# all configuration comes from .env via env_file rather than being
# hardcoded or listed per-variable. See docs/vps-deployment.md.

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kleinanzeigen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-kleinanzeigen_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kleinanzeigen}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: app/api/Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-local}
        BUILD_NUMBER: ${BUILD_NUMBER:-0}
        APP_VERSION: ${APP_VERSION:-dev}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: app/worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: app/beat/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
