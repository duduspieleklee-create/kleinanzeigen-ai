name: Build, Test and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint & basic checks
  # ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check app/

  # ─────────────────────────────────────────────
  # 2. Smoke-test: import all services + start API
  #    Runs on PRs too — blocks build if app is broken.
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import check — all three services
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          python -c "from app.api.main import app; print('API OK')"
          python -c "from app.worker.celery_app import celery_app; print('Worker OK')"
          python -c "from app.beat.celery_beat import celery_app; print('Beat OK')"

      - name: Start API and verify /healthz responds 200
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          uvicorn app.api.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/healthz || echo "000")
            [ "$STATUS" = "200" ] && echo "API started (attempt $i)" && break
            sleep 1
          done
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/healthz)
          if [ "$STATUS" != "200" ]; then echo "FAIL: /healthz returned $STATUS"; exit 1; fi
          echo "Smoke test passed"

  # ─────────────────────────────────────────────
  # 3. Build and push Docker images to ACR
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Compute build timestamp
        run: echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/api/Dockerfile
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_NUMBER=${{ github.run_number }}
            APP_VERSION=1.0.${{ github.run_number }}
            BUILD_TIME=${{ env.BUILD_TIME }}
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-api:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-api:latest

      - name: Build and Push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/worker/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-worker:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-worker:latest

      - name: Build and Push Beat
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/beat/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-beat:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-beat:latest

  # ─────────────────────────────────────────────
  # 4. Run database migrations
  # ─────────────────────────────────────────────
  migrate:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic upgrade head

  # ─────────────────────────────────────────────
  # 5. Deploy to Azure Container Apps directly
  #
  #    Required GitHub secrets:
  #      AZURE_CREDENTIALS     — service principal JSON (az ad sp create-for-rbac --sdk-auth)
  #      ACR_LOGIN_SERVER, ACR_USERNAME, ACR_PASSWORD  — Azure Container Registry
  #      DATABASE_URL          — also used by the migrate job above
  #      REDIS_URL
  #      SECRET_KEY
  #      APP_USERNAME          — login username (default: admin)
  #      APP_PASSWORD          — login password
  #      ALLOWED_EMAILS        — comma-separated allow-list (empty = allow all)
  #      SYSTEM_USER_ID        — DB user ID for Beat-scheduled tasks (default 1)
  #      VAPID_PRIVATE_KEY     — Web push (leave empty to disable)
  #      VAPID_PUBLIC_KEY      — Web push (leave empty to disable)
  #      VAPID_EMAIL           — Web push contact (default mailto:admin@example.com)
  #      GOOGLE_CLIENT_ID      — Google OAuth client ID (leave unset to disable Google login)
  #      GOOGLE_CLIENT_SECRET  — Google OAuth client secret
  #      STRIPE_SECRET_KEY     — Stripe secret API key (leave empty to disable paid plans)
  #      STRIPE_WEBHOOK_SECRET — Stripe webhook signing secret for /billing/webhook
  #      STRIPE_PRICE_CORE     — Stripe recurring Price ID for the Core plan
  #      STRIPE_PRICE_PRO      — Stripe recurring Price ID for the Pro plan
  #      PUBLIC_BASE_URL       — public https origin used for Stripe redirect URLs
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update API (image + env vars)
        run: |
          az containerapp update \
            --name kleinanzeigen-api \
            --resource-group kleinanzeigen-ai-rg \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-api:${{ github.sha }}" \
            --set-env-vars \
              "ENVIRONMENT=production" \
              "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
              "REDIS_URL=${{ secrets.REDIS_URL }}" \
              "SECRET_KEY=${{ secrets.SECRET_KEY }}" \
              "APP_USERNAME=${{ secrets.APP_USERNAME }}" \
              "APP_PASSWORD=${{ secrets.APP_PASSWORD }}" \
              "ALLOWED_EMAILS=${{ secrets.ALLOWED_EMAILS }}" \
              "SYSTEM_USER_ID=${{ secrets.SYSTEM_USER_ID }}" \
              "VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}" \
              "VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}" \
              "VAPID_EMAIL=${{ secrets.VAPID_EMAIL }}" \
              "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
              "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" \
              "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
              "STRIPE_PRICE_CORE=${{ secrets.STRIPE_PRICE_CORE }}" \
              "STRIPE_PRICE_PRO=${{ secrets.STRIPE_PRICE_PRO }}" \
              "PUBLIC_BASE_URL=${{ secrets.PUBLIC_BASE_URL }}"
          echo "✓ kleinanzeigen-api updated"

      - name: Update Worker image
        run: |
          az containerapp update \
            --name kleinanzeigen-worker \
            --resource-group kleinanzeigen-ai-rg \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-worker:${{ github.sha }}" \
            --set-env-vars \
              "ENVIRONMENT=production" \
              "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
              "REDIS_URL=${{ secrets.REDIS_URL }}" \
              "SECRET_KEY=${{ secrets.SECRET_KEY }}" \
              "SYSTEM_USER_ID=${{ secrets.SYSTEM_USER_ID }}" \
              "VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}" \
              "VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}" \
              "VAPID_EMAIL=${{ secrets.VAPID_EMAIL }}"
          echo "✓ kleinanzeigen-worker updated"

      - name: Update Beat image
        run: |
          az containerapp update \
            --name kleinanzeigen-beat \
            --resource-group kleinanzeigen-ai-rg \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-beat:${{ github.sha }}" \
            --set-env-vars \
              "ENVIRONMENT=production" \
              "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
              "REDIS_URL=${{ secrets.REDIS_URL }}" \
              "SECRET_KEY=${{ secrets.SECRET_KEY }}"
          echo "✓ kleinanzeigen-beat updated"

  # ─────────────────────────────────────────────
  # 6. Post-deploy live smoke test
  #    Polls the live URL for up to 5 minutes.
  #    Failure sends a GitHub notification email.
  # ─────────────────────────────────────────────
  post-deploy-smoke:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for deployment and verify live version matches this commit
        run: |
          BASE="https://kleinanzeigen-api.bluepebble-32fde7d3.westeurope.azurecontainerapps.io"
          EXPECTED="${{ github.sha }}"
          echo "Waiting for live /version to report commit $EXPECTED (up to 10 × 30s = 5 min)..."
          for i in $(seq 1 10); do
            LIVE=$(curl -s "$BASE/version" | grep -o '"commit"[^,]*' | grep -o '[0-9a-f]\{40\}' || echo "")
            if [ "$LIVE" = "$EXPECTED" ]; then
              echo "Live smoke test passed (attempt $i): serving $LIVE"
              exit 0
            fi
            echo "Attempt $i: live commit is '${LIVE:-none}', expected $EXPECTED — waiting 30s..."
            sleep 30
          done
          echo "FAIL: live /version never matched $EXPECTED — the new image did not roll out."
          exit 1
