name: Build, Test and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint & basic checks
  # ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check app/

  # ─────────────────────────────────────────────
  # 2. Smoke-test: import all services + start API
  #    Runs on PRs too — blocks build if app is broken.
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import check — all three services
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          python -c "from app.api.main import app; print('API OK')"
          python -c "from app.worker.celery_app import celery_app; print('Worker OK')"
          python -c "from app.beat.celery_beat import celery_app; print('Beat OK')"

      - name: Start API and verify /healthz responds 200
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          uvicorn app.api.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/healthz || echo "000")
            [ "$STATUS" = "200" ] && echo "API started (attempt $i)" && break
            sleep 1
          done
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/healthz)
          if [ "$STATUS" != "200" ]; then echo "FAIL: /healthz returned $STATUS"; exit 1; fi
          echo "Smoke test passed"

  # ─────────────────────────────────────────────
  # 3. Build and push Docker images to Artifact Registry
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    env:
      AR_HOST: ${{ vars.GCP_REGION }}-docker.pkg.dev
      AR_PATH: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/kleinanzeigen-ai
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Login to Artifact Registry
        run: gcloud auth configure-docker "$AR_HOST" --quiet

      - name: Compute build timestamp
        run: echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/api/Dockerfile
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_NUMBER=${{ github.run_number }}
            APP_VERSION=1.0.${{ github.run_number }}
            BUILD_TIME=${{ env.BUILD_TIME }}
          tags: |
            ${{ env.AR_PATH }}/kleinanzeigen-ai-api:${{ github.sha }}
            ${{ env.AR_PATH }}/kleinanzeigen-ai-api:latest

      - name: Build and Push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/worker/Dockerfile
          push: true
          tags: |
            ${{ env.AR_PATH }}/kleinanzeigen-ai-worker:${{ github.sha }}
            ${{ env.AR_PATH }}/kleinanzeigen-ai-worker:latest

      - name: Build and Push Beat
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/beat/Dockerfile
          push: true
          tags: |
            ${{ env.AR_PATH }}/kleinanzeigen-ai-beat:${{ github.sha }}
            ${{ env.AR_PATH }}/kleinanzeigen-ai-beat:latest

  # ─────────────────────────────────────────────
  # 4. Run database migrations
  #
  #    Cloud SQL is private-IP-only, so migrations run inside a Cloud Run
  #    Job (attached to the VPC connector) rather than directly from the
  #    GitHub-hosted runner, which has no route to the private IP.
  # ─────────────────────────────────────────────
  migrate:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy and run the migrate job
        run: |
          gcloud run jobs deploy kleinanzeigen-migrate \
            --image="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/kleinanzeigen-ai/kleinanzeigen-ai-api:${{ github.sha }}" \
            --region="${{ vars.GCP_REGION }}" \
            --service-account="kleinanzeigen-run-sa@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --vpc-connector="kleinanzeigen-connector" \
            --vpc-egress=private-ranges-only \
            --set-secrets="DATABASE_URL=kleinanzeigen-DATABASE_URL:latest" \
            --command=alembic --args=upgrade,head \
            --max-retries=0 --task-timeout=300 \
            --quiet
          gcloud run jobs execute kleinanzeigen-migrate --region="${{ vars.GCP_REGION }}" --wait

  # ─────────────────────────────────────────────
  # 5. Deploy to Cloud Run
  #
  #    Required GitHub secrets:
  #      GCP_WORKLOAD_IDENTITY_PROVIDER — output by infra/gcp-setup.sh
  #      GCP_SERVICE_ACCOUNT            — output by infra/gcp-setup.sh
  #      DATABASE_URL, REDIS_URL, SECRET_KEY, APP_USERNAME, APP_PASSWORD,
  #      ALLOWED_EMAILS, ADMIN_EMAILS, SYSTEM_USER_ID, VAPID_PRIVATE_KEY,
  #      VAPID_PUBLIC_KEY, VAPID_EMAIL, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
  #      STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PRICE_CORE,
  #      STRIPE_PRICE_PRO, PUBLIC_BASE_URL, RESEND_API_KEY, EMAIL_FROM
  #      (same meanings as before — see docs/architecture.md)
  #
  #    Required GitHub variables: GCP_PROJECT_ID, GCP_REGION
  #
  #    Secrets are stored in Secret Manager under kleinanzeigen-<NAME> and
  #    referenced by the Cloud Run services/job via --set-secrets — this
  #    step keeps Secret Manager in sync with GitHub Secrets before each
  #    deploy so the new revision picks up fresh values.
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    outputs:
      api_url: ${{ steps.deploy-api.outputs.url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync app secrets to Secret Manager
        run: |
          declare -A SECRETS=(
            [DATABASE_URL]="${{ secrets.DATABASE_URL }}"
            [REDIS_URL]="${{ secrets.REDIS_URL }}"
            [SECRET_KEY]="${{ secrets.SECRET_KEY }}"
            [APP_USERNAME]="${{ secrets.APP_USERNAME }}"
            [APP_PASSWORD]="${{ secrets.APP_PASSWORD }}"
            [ALLOWED_EMAILS]="${{ secrets.ALLOWED_EMAILS }}"
            [ADMIN_EMAILS]="${{ secrets.ADMIN_EMAILS }}"
            [SYSTEM_USER_ID]="${{ secrets.SYSTEM_USER_ID }}"
            [VAPID_PRIVATE_KEY]="${{ secrets.VAPID_PRIVATE_KEY }}"
            [VAPID_PUBLIC_KEY]="${{ secrets.VAPID_PUBLIC_KEY }}"
            [VAPID_EMAIL]="${{ secrets.VAPID_EMAIL }}"
            [GOOGLE_CLIENT_ID]="${{ secrets.GOOGLE_CLIENT_ID }}"
            [GOOGLE_CLIENT_SECRET]="${{ secrets.GOOGLE_CLIENT_SECRET }}"
            [STRIPE_SECRET_KEY]="${{ secrets.STRIPE_SECRET_KEY }}"
            [STRIPE_WEBHOOK_SECRET]="${{ secrets.STRIPE_WEBHOOK_SECRET }}"
            [STRIPE_PRICE_CORE]="${{ secrets.STRIPE_PRICE_CORE }}"
            [STRIPE_PRICE_PRO]="${{ secrets.STRIPE_PRICE_PRO }}"
            [PUBLIC_BASE_URL]="${{ secrets.PUBLIC_BASE_URL }}"
            [RESEND_API_KEY]="${{ secrets.RESEND_API_KEY }}"
            [EMAIL_FROM]="${{ secrets.EMAIL_FROM }}"
          )
          for NAME in "${!SECRETS[@]}"; do
            printf '%s' "${SECRETS[$NAME]}" | gcloud secrets versions add "kleinanzeigen-$NAME" --data-file=- >/dev/null
          done
          echo "✓ secrets synced to Secret Manager"

      - name: Deploy API
        id: deploy-api
        run: |
          gcloud run deploy kleinanzeigen-api \
            --image="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/kleinanzeigen-ai/kleinanzeigen-ai-api:${{ github.sha }}" \
            --region="${{ vars.GCP_REGION }}" \
            --service-account="kleinanzeigen-run-sa@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --vpc-connector="kleinanzeigen-connector" \
            --vpc-egress=private-ranges-only \
            --port=8000 \
            --allow-unauthenticated \
            --set-env-vars="ENVIRONMENT=production" \
            --set-secrets="DATABASE_URL=kleinanzeigen-DATABASE_URL:latest,REDIS_URL=kleinanzeigen-REDIS_URL:latest,SECRET_KEY=kleinanzeigen-SECRET_KEY:latest,APP_USERNAME=kleinanzeigen-APP_USERNAME:latest,APP_PASSWORD=kleinanzeigen-APP_PASSWORD:latest,ALLOWED_EMAILS=kleinanzeigen-ALLOWED_EMAILS:latest,ADMIN_EMAILS=kleinanzeigen-ADMIN_EMAILS:latest,SYSTEM_USER_ID=kleinanzeigen-SYSTEM_USER_ID:latest,VAPID_PRIVATE_KEY=kleinanzeigen-VAPID_PRIVATE_KEY:latest,VAPID_PUBLIC_KEY=kleinanzeigen-VAPID_PUBLIC_KEY:latest,VAPID_EMAIL=kleinanzeigen-VAPID_EMAIL:latest,GOOGLE_CLIENT_ID=kleinanzeigen-GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=kleinanzeigen-GOOGLE_CLIENT_SECRET:latest,STRIPE_SECRET_KEY=kleinanzeigen-STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=kleinanzeigen-STRIPE_WEBHOOK_SECRET:latest,STRIPE_PRICE_CORE=kleinanzeigen-STRIPE_PRICE_CORE:latest,STRIPE_PRICE_PRO=kleinanzeigen-STRIPE_PRICE_PRO:latest,PUBLIC_BASE_URL=kleinanzeigen-PUBLIC_BASE_URL:latest,RESEND_API_KEY=kleinanzeigen-RESEND_API_KEY:latest,EMAIL_FROM=kleinanzeigen-EMAIL_FROM:latest" \
            --quiet
          URL=$(gcloud run services describe kleinanzeigen-api --region="${{ vars.GCP_REGION }}" --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Deploy Worker
        run: |
          gcloud run deploy kleinanzeigen-worker \
            --image="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/kleinanzeigen-ai/kleinanzeigen-ai-worker:${{ github.sha }}" \
            --region="${{ vars.GCP_REGION }}" \
            --service-account="kleinanzeigen-run-sa@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --vpc-connector="kleinanzeigen-connector" \
            --vpc-egress=private-ranges-only \
            --port=8080 --ingress=internal --no-allow-unauthenticated \
            --no-cpu-throttling --min-instances=1 --max-instances=1 \
            --set-env-vars="ENVIRONMENT=production" \
            --set-secrets="DATABASE_URL=kleinanzeigen-DATABASE_URL:latest,REDIS_URL=kleinanzeigen-REDIS_URL:latest,SECRET_KEY=kleinanzeigen-SECRET_KEY:latest,APP_PASSWORD=kleinanzeigen-APP_PASSWORD:latest,SYSTEM_USER_ID=kleinanzeigen-SYSTEM_USER_ID:latest,VAPID_PRIVATE_KEY=kleinanzeigen-VAPID_PRIVATE_KEY:latest,VAPID_PUBLIC_KEY=kleinanzeigen-VAPID_PUBLIC_KEY:latest,VAPID_EMAIL=kleinanzeigen-VAPID_EMAIL:latest" \
            --quiet

      - name: Deploy Beat
        run: |
          gcloud run deploy kleinanzeigen-beat \
            --image="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/kleinanzeigen-ai/kleinanzeigen-ai-beat:${{ github.sha }}" \
            --region="${{ vars.GCP_REGION }}" \
            --service-account="kleinanzeigen-run-sa@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --vpc-connector="kleinanzeigen-connector" \
            --vpc-egress=private-ranges-only \
            --port=8080 --ingress=internal --no-allow-unauthenticated \
            --no-cpu-throttling --min-instances=1 --max-instances=1 \
            --set-env-vars="ENVIRONMENT=production" \
            --set-secrets="DATABASE_URL=kleinanzeigen-DATABASE_URL:latest,REDIS_URL=kleinanzeigen-REDIS_URL:latest,SECRET_KEY=kleinanzeigen-SECRET_KEY:latest,APP_PASSWORD=kleinanzeigen-APP_PASSWORD:latest" \
            --quiet

  # ─────────────────────────────────────────────
  # 6. Post-deploy live smoke test
  #    Polls the live URL for up to 5 minutes.
  # ─────────────────────────────────────────────
  post-deploy-smoke:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for deployment and verify live version matches this commit
        run: |
          BASE="${{ needs.deploy.outputs.api_url }}"
          EXPECTED="${{ github.sha }}"
          echo "Waiting for live /version to report commit $EXPECTED (up to 10 × 30s = 5 min)..."
          for i in $(seq 1 10); do
            LIVE=$(curl -s "$BASE/version" | grep -o '"commit"[^,]*' | grep -o '[0-9a-f]\{40\}' || echo "")
            if [ "$LIVE" = "$EXPECTED" ]; then
              echo "Live smoke test passed (attempt $i): serving $LIVE"
              exit 0
            fi
            echo "Attempt $i: live commit is '${LIVE:-none}', expected $EXPECTED — waiting 30s..."
            sleep 30
          done
          echo "FAIL: live /version never matched $EXPECTED — the new image did not roll out."
          exit 1
