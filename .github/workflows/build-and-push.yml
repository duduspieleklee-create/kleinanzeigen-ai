name: Build, Test and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint & basic checks (runs first, fast)
  # ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check app/

  # ─────────────────────────────────────────────
  # 2a. Validate Helm charts (parallel with build)
  #     helm lint  — checks chart syntax and structure
  #     helm template — renders the chart with CI-like values to catch
  #                     missing keys that lint alone won't flag
  # ─────────────────────────────────────────────
  helm-lint:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm charts
        run: |
          helm lint infrastructure/helm/api
          helm lint infrastructure/helm/worker
          helm lint infrastructure/helm/beat

      - name: Render Helm charts (template validation)
        run: |
          helm template ci-release infrastructure/helm/api \
            --set image.repository=acr.example.com/kleinanzeigen-ai-api \
            --set image.tag=ci-test-sha \
            > /dev/null

          helm template ci-release infrastructure/helm/worker \
            --set image.repository=acr.example.com/kleinanzeigen-ai-worker \
            --set image.tag=ci-test-sha \
            > /dev/null

          helm template ci-release infrastructure/helm/beat \
            --set image.repository=acr.example.com/kleinanzeigen-ai-beat \
            --set image.tag=ci-test-sha \
            > /dev/null

  # ─────────────────────────────────────────────
  # 2b. Build and push Docker images (parallel with helm-lint)
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/api/Dockerfile
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-api:${{ github.sha }}

      - name: Build and Push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/worker/Dockerfile
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-worker:${{ github.sha }}

      - name: Build and Push Beat
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/beat/Dockerfile
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-beat:${{ github.sha }}

  # ─────────────────────────────────────────────
  # 3. Run database migrations
  # ─────────────────────────────────────────────
  migrate:
    runs-on: ubuntu-latest
    needs: [build, helm-lint]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic upgrade head

  # ─────────────────────────────────────────────
  # 4. Deploy to AKS
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "f196df42-b27f-416b-b16f-d6f83a94cd0f"
            }

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Create / update Kubernetes secret
        run: |
          kubectl create secret generic kleinanzeigen-secrets \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=REDIS_URL="${{ secrets.REDIS_URL }}" \
            --from-literal=SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --from-literal=GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            --from-literal=GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy API
        run: |
          helm upgrade --install kleinanzeigen-api infrastructure/helm/api \
            --set image.repository=${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-api \
            --set image.tag=${{ github.sha }} \
            --wait --timeout=5m

      - name: Deploy Worker
        run: |
          helm upgrade --install kleinanzeigen-worker infrastructure/helm/worker \
            --set image.repository=${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-worker \
            --set image.tag=${{ github.sha }} \
            --wait --timeout=5m

      - name: Deploy Beat
        run: |
          helm upgrade --install kleinanzeigen-beat infrastructure/helm/beat \
            --set image.repository=${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-beat \
            --set image.tag=${{ github.sha }} \
            --wait --timeout=5m
