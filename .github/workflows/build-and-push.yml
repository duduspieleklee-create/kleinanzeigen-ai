name: Build, Test and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint & basic checks
  # ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check app/

  # ─────────────────────────────────────────────
  # 2. Build and push Docker images to ACR
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-api:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-api:latest

      - name: Build and Push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/worker/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-worker:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-worker:latest

      - name: Build and Push Beat
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/beat/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-beat:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-beat:latest

  # ─────────────────────────────────────────────
  # 3. Run database migrations
  # ─────────────────────────────────────────────
  migrate:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic upgrade head

  # ─────────────────────────────────────────────
  # 4. Trigger Octopus Deploy release
  #
  #    Required GitHub secrets:
  #      OCTOPUS_SERVER_URL    — e.g. https://your-instance.octopus.app
  #      OCTOPUS_API_KEY       — API key from Octopus → Profile → API Keys
  #      ACR_LOGIN_SERVER, ACR_USERNAME, ACR_PASSWORD  — Azure Container Registry
  #      DATABASE_URL          — also used by the migrate job above
  #      REDIS_URL
  #      SECRET_KEY
  #      GOOGLE_CLIENT_ID      — Google OAuth app credential
  #      GOOGLE_CLIENT_SECRET  — Google OAuth app credential
  #      ALLOWED_EMAILS        — comma-separated allow-list (empty = allow all)
  #      SYSTEM_USER_ID        — DB user ID for Beat-scheduled tasks (default 1)
  #      VAPID_PRIVATE_KEY     — Web push (leave empty to disable)
  #      VAPID_PUBLIC_KEY      — Web push (leave empty to disable)
  #      VAPID_EMAIL           — Web push contact (default mailto:admin@example.com)
  #      BEAT_KEYWORDS         — Scheduled search keywords (default handwerker)
  #      BEAT_LOCATION         — Scheduled search location (default berlin)
  #      BEAT_PRICE_MAX        — Scheduled search max price (default 200)
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Octopus CLI
        uses: OctopusDeploy/install-octopus-cli-action@v3
        with:
          version: latest

      - name: Push build information to Octopus
        uses: OctopusDeploy/push-build-information-action@v3
        with:
          server: ${{ secrets.OCTOPUS_SERVER_URL }}
          api_key: ${{ secrets.OCTOPUS_API_KEY }}
          packages: |
            kleinanzeigen-ai-api
            kleinanzeigen-ai-worker
            kleinanzeigen-ai-beat
          version: ${{ github.sha }}

      - name: Create Octopus release
        uses: OctopusDeploy/create-release-action@v3
        id: create_release
        with:
          server: ${{ secrets.OCTOPUS_SERVER_URL }}
          api_key: ${{ secrets.OCTOPUS_API_KEY }}
          project: "kleinanzeigen-ai"
          release_number: ${{ github.sha }}
          default_package_version: ${{ github.sha }}

      - name: Deploy release to Dev
        uses: OctopusDeploy/deploy-release-action@v3
        with:
          server: ${{ secrets.OCTOPUS_SERVER_URL }}
          api_key: ${{ secrets.OCTOPUS_API_KEY }}
          project: "kleinanzeigen-ai"
          release_number: ${{ github.sha }}
          environments: "Dev"
          wait_for_deployment: true
          deployment_timeout: "00:10:00"
          variables: |
            DATABASE_URL: ${{ secrets.DATABASE_URL }}
            REDIS_URL: ${{ secrets.REDIS_URL }}
            SECRET_KEY: ${{ secrets.SECRET_KEY }}
            GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
            ALLOWED_EMAILS: ${{ secrets.ALLOWED_EMAILS }}
            SYSTEM_USER_ID: ${{ secrets.SYSTEM_USER_ID }}
            VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
            VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
            VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
            BEAT_KEYWORDS: ${{ secrets.BEAT_KEYWORDS }}
            BEAT_LOCATION: ${{ secrets.BEAT_LOCATION }}
            BEAT_PRICE_MAX: ${{ secrets.BEAT_PRICE_MAX }}
