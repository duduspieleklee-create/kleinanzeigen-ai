name: Build, Test and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint & basic checks
  # ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check app/

  # ─────────────────────────────────────────────
  # 2. Smoke-test: import all services + start API
  #    Runs on PRs too — blocks build if app is broken.
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import check — all three services
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          python -c "from app.api.main import app; print('API OK')"
          python -c "from app.worker.celery_app import celery_app; print('Worker OK')"
          python -c "from app.beat.celery_beat import celery_app; print('Beat OK')"

      - name: Start API and verify /healthz responds 200
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          uvicorn app.api.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/healthz || echo "000")
            [ "$STATUS" = "200" ] && echo "API started (attempt $i)" && break
            sleep 1
          done
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/healthz)
          if [ "$STATUS" != "200" ]; then echo "FAIL: /healthz returned $STATUS"; exit 1; fi
          echo "Smoke test passed"

  # ─────────────────────────────────────────────
  # 3. Build and push Docker images to ECR
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute build timestamp
        run: echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/api/Dockerfile
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_NUMBER=${{ github.run_number }}
            APP_VERSION=1.0.${{ github.run_number }}
            BUILD_TIME=${{ env.BUILD_TIME }}
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/kleinanzeigen-ai-api:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/kleinanzeigen-ai-api:latest

      - name: Build and Push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/worker/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/kleinanzeigen-ai-worker:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/kleinanzeigen-ai-worker:latest

      - name: Build and Push Beat
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/beat/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/kleinanzeigen-ai-beat:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/kleinanzeigen-ai-beat:latest

  # ─────────────────────────────────────────────
  # 4. Run database migrations
  # ─────────────────────────────────────────────
  migrate:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic upgrade head

  # ─────────────────────────────────────────────
  # 5. Deploy to ECS on Fargate
  #
  #    Required GitHub secrets:
  #      AWS_DEPLOY_ROLE_ARN   — IAM role ARN assumed via OIDC (see infra/aws-setup.sh)
  #      DATABASE_URL          — also used by the migrate job above; synced to Secrets Manager
  #      REDIS_URL
  #      SECRET_KEY
  #      APP_USERNAME          — login username (default: admin)
  #      APP_PASSWORD          — login password
  #      ALLOWED_EMAILS        — comma-separated allow-list (empty = allow all)
  #      ADMIN_EMAILS
  #      SYSTEM_USER_ID        — DB user ID for Beat-scheduled tasks (default 1)
  #      VAPID_PRIVATE_KEY     — Web push (leave empty to disable)
  #      VAPID_PUBLIC_KEY      — Web push (leave empty to disable)
  #      VAPID_EMAIL           — Web push contact (default mailto:admin@example.com)
  #      GOOGLE_CLIENT_ID      — Google OAuth client ID (leave unset to disable Google login)
  #      GOOGLE_CLIENT_SECRET  — Google OAuth client secret
  #      STRIPE_SECRET_KEY     — Stripe secret API key (leave empty to disable paid plans)
  #      STRIPE_WEBHOOK_SECRET — Stripe webhook signing secret for /billing/webhook
  #      STRIPE_PRICE_CORE     — Stripe recurring Price ID for the Core plan
  #      STRIPE_PRICE_PRO      — Stripe recurring Price ID for the Pro plan
  #      PUBLIC_BASE_URL       — public https origin used for Stripe redirect URLs
  #      RESEND_API_KEY        — Resend API key for verification emails (empty = email disabled)
  #      EMAIL_FROM            — verified sender address for outgoing email
  #
  #    Required GitHub variables: AWS_REGION, AWS_ACCOUNT_ID, PUBLIC_APP_URL
  #    (PUBLIC_APP_URL is the ALB DNS name or custom domain, used by the
  #    post-deploy-smoke job below, e.g. http://kleinanzeigen-alb-xxxx.eu-central-1.elb.amazonaws.com)
  #
  #    Secrets are stored in AWS Secrets Manager under kleinanzeigen/<NAME> and
  #    referenced by the ECS task definitions (infra/ecs/task-def-*.json) via
  #    `secrets[].valueFrom` — this step keeps Secrets Manager in sync with the
  #    GitHub Secrets values before rolling out the new task definition.
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync app secrets to Secrets Manager
        run: |
          declare -A SECRETS=(
            [DATABASE_URL]="${{ secrets.DATABASE_URL }}"
            [REDIS_URL]="${{ secrets.REDIS_URL }}"
            [SECRET_KEY]="${{ secrets.SECRET_KEY }}"
            [APP_USERNAME]="${{ secrets.APP_USERNAME }}"
            [APP_PASSWORD]="${{ secrets.APP_PASSWORD }}"
            [ALLOWED_EMAILS]="${{ secrets.ALLOWED_EMAILS }}"
            [ADMIN_EMAILS]="${{ secrets.ADMIN_EMAILS }}"
            [SYSTEM_USER_ID]="${{ secrets.SYSTEM_USER_ID }}"
            [VAPID_PRIVATE_KEY]="${{ secrets.VAPID_PRIVATE_KEY }}"
            [VAPID_PUBLIC_KEY]="${{ secrets.VAPID_PUBLIC_KEY }}"
            [VAPID_EMAIL]="${{ secrets.VAPID_EMAIL }}"
            [GOOGLE_CLIENT_ID]="${{ secrets.GOOGLE_CLIENT_ID }}"
            [GOOGLE_CLIENT_SECRET]="${{ secrets.GOOGLE_CLIENT_SECRET }}"
            [STRIPE_SECRET_KEY]="${{ secrets.STRIPE_SECRET_KEY }}"
            [STRIPE_WEBHOOK_SECRET]="${{ secrets.STRIPE_WEBHOOK_SECRET }}"
            [STRIPE_PRICE_CORE]="${{ secrets.STRIPE_PRICE_CORE }}"
            [STRIPE_PRICE_PRO]="${{ secrets.STRIPE_PRICE_PRO }}"
            [PUBLIC_BASE_URL]="${{ secrets.PUBLIC_BASE_URL }}"
            [RESEND_API_KEY]="${{ secrets.RESEND_API_KEY }}"
            [EMAIL_FROM]="${{ secrets.EMAIL_FROM }}"
          )
          for NAME in "${!SECRETS[@]}"; do
            aws secretsmanager put-secret-value \
              --secret-id "kleinanzeigen/$NAME" \
              --secret-string "${SECRETS[$NAME]}" >/dev/null
          done
          echo "✓ secrets synced to Secrets Manager"

      - name: Render and deploy API task definition
        run: |
          sed -e "s/__AWS_ACCOUNT_ID__/${{ vars.AWS_ACCOUNT_ID }}/g" -e "s/__AWS_REGION__/${{ vars.AWS_REGION }}/g" \
            infra/ecs/task-def-api.json > /tmp/task-def-api.json
      - name: Deploy API
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        id: render-api
        with:
          task-definition: /tmp/task-def-api.json
          container-name: api
          image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/kleinanzeigen-ai-api:${{ github.sha }}
      - uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-api.outputs.task-definition }}
          service: kleinanzeigen-api
          cluster: kleinanzeigen-cluster
          wait-for-service-stability: true

      - name: Render and deploy Worker task definition
        run: |
          sed -e "s/__AWS_ACCOUNT_ID__/${{ vars.AWS_ACCOUNT_ID }}/g" -e "s/__AWS_REGION__/${{ vars.AWS_REGION }}/g" \
            infra/ecs/task-def-worker.json > /tmp/task-def-worker.json
      - name: Deploy Worker
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        id: render-worker
        with:
          task-definition: /tmp/task-def-worker.json
          container-name: worker
          image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/kleinanzeigen-ai-worker:${{ github.sha }}
      - uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-worker.outputs.task-definition }}
          service: kleinanzeigen-worker
          cluster: kleinanzeigen-cluster
          wait-for-service-stability: true

      - name: Render and deploy Beat task definition
        run: |
          sed -e "s/__AWS_ACCOUNT_ID__/${{ vars.AWS_ACCOUNT_ID }}/g" -e "s/__AWS_REGION__/${{ vars.AWS_REGION }}/g" \
            infra/ecs/task-def-beat.json > /tmp/task-def-beat.json
      - name: Deploy Beat
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        id: render-beat
        with:
          task-definition: /tmp/task-def-beat.json
          container-name: beat
          image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/kleinanzeigen-ai-beat:${{ github.sha }}
      - uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-beat.outputs.task-definition }}
          service: kleinanzeigen-beat
          cluster: kleinanzeigen-cluster
          wait-for-service-stability: true

  # ─────────────────────────────────────────────
  # 6. Post-deploy live smoke test
  #    Polls the live URL for up to 5 minutes.
  #    Failure sends a GitHub notification email.
  # ─────────────────────────────────────────────
  post-deploy-smoke:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for deployment and verify live version matches this commit
        run: |
          BASE="${{ vars.PUBLIC_APP_URL }}"
          EXPECTED="${{ github.sha }}"
          echo "Waiting for live /version to report commit $EXPECTED (up to 10 × 30s = 5 min)..."
          for i in $(seq 1 10); do
            LIVE=$(curl -s "$BASE/version" | grep -o '"commit"[^,]*' | grep -o '[0-9a-f]\{40\}' || echo "")
            if [ "$LIVE" = "$EXPECTED" ]; then
              echo "Live smoke test passed (attempt $i): serving $LIVE"
              exit 0
            fi
            echo "Attempt $i: live commit is '${LIVE:-none}', expected $EXPECTED — waiting 30s..."
            sleep 30
          done
          echo "FAIL: live /version never matched $EXPECTED — the new image did not roll out."
          exit 1
