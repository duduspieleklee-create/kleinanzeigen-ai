name: Build, Test and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint & basic checks
  # ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check app/

  # ─────────────────────────────────────────────
  # 2. Smoke-test: import all services + start API
  #    Runs on PRs too — blocks build if app is broken.
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import check — all three services
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          python -c "from app.api.main import app; print('API OK')"
          python -c "from app.worker.celery_app import celery_app; print('Worker OK')"
          python -c "from app.beat.celery_beat import celery_app; print('Beat OK')"

      - name: Start API and verify /healthz responds 200
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          uvicorn app.api.main:app --host 127.0.0.1 --port 8000 &
          # Poll until ready (up to 15s)
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/healthz || echo "000")
            [ "$STATUS" = "200" ] && echo "API started (attempt $i)" && break
            sleep 1
          done
          # Assert
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/healthz)
          if [ "$STATUS" != "200" ]; then echo "FAIL: /healthz returned $STATUS"; exit 1; fi
          echo "Smoke test passed"

  # ─────────────────────────────────────────────
  # 3. Build and push Docker images to ACR
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-api:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-api:latest

      - name: Build and Push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/worker/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-worker:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-worker:latest

      - name: Build and Push Beat
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/beat/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-beat:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/kleinanzeigen-ai-beat:latest

  # ─────────────────────────────────────────────
  # 3. Run database migrations
  # ─────────────────────────────────────────────
  migrate:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: alembic upgrade head

  # ─────────────────────────────────────────────
  # 5. Trigger Octopus Deploy release
  #
  #    Required GitHub secrets:
  #      OCTOPUS_SERVER_URL    — e.g. https://your-instance.octopus.app
  #      OCTOPUS_API_KEY       — API key from Octopus → Profile → API Keys
  #      ACR_LOGIN_SERVER, ACR_USERNAME, ACR_PASSWORD  — Azure Container Registry
  #      DATABASE_URL          — also used by the migrate job above
  #      REDIS_URL
  #      SECRET_KEY
  #      APP_USERNAME          — login username (default: admin)
  #      APP_PASSWORD          — login password
  #      ALLOWED_EMAILS        — comma-separated allow-list (empty = allow all)
  #      SYSTEM_USER_ID        — DB user ID for Beat-scheduled tasks (default 1)
  #      VAPID_PRIVATE_KEY     — Web push (leave empty to disable)
  #      VAPID_PUBLIC_KEY      — Web push (leave empty to disable)
  #      VAPID_EMAIL           — Web push contact (default mailto:admin@example.com)
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Octopus CLI
        uses: OctopusDeploy/install-octopus-cli-action@v3
        with:
          version: latest

      - name: Push build information to Octopus
        uses: OctopusDeploy/push-build-information-action@v3
        with:
          server: ${{ secrets.OCTOPUS_SERVER_URL }}
          api_key: ${{ secrets.OCTOPUS_API_KEY }}
          space: "Default"
          packages: |
            kleinanzeigen-ai-api
            kleinanzeigen-ai-worker
            kleinanzeigen-ai-beat
          version: "1.0.${{ github.run_number }}"

      - name: Create Octopus release
        uses: OctopusDeploy/create-release-action@v3
        id: create_release
        with:
          server: ${{ secrets.OCTOPUS_SERVER_URL }}
          api_key: ${{ secrets.OCTOPUS_API_KEY }}
          space: "Default"
          project: "kleinanzeigen-ai"
          release_number: "1.0.${{ github.run_number }}"
          default_package_version: "1.0.${{ github.run_number }}"

      - name: Deploy release to Dev
        uses: OctopusDeploy/deploy-release-action@v3
        with:
          server: ${{ secrets.OCTOPUS_SERVER_URL }}
          api_key: ${{ secrets.OCTOPUS_API_KEY }}
          space: "Default"
          project: "kleinanzeigen-ai"
          release_number: "1.0.${{ github.run_number }}"
          environments: "Development"
          variables: |
            DATABASE_URL: ${{ secrets.DATABASE_URL }}
            REDIS_URL: ${{ secrets.REDIS_URL }}
            SECRET_KEY: ${{ secrets.SECRET_KEY }}
            APP_USERNAME: ${{ secrets.APP_USERNAME }}
            APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
            ALLOWED_EMAILS: ${{ secrets.ALLOWED_EMAILS }}
            SYSTEM_USER_ID: ${{ secrets.SYSTEM_USER_ID }}
            VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
            VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
            VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}

  # ─────────────────────────────────────────────
  # 6. Post-deploy live smoke test
  #    Polls the live URL for up to 5 minutes.
  #    Failure sends a GitHub notification email.
  # ─────────────────────────────────────────────
  post-deploy-smoke:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for deployment and verify live /healthz
        run: |
          URL="https://kleinanzeigen-api.bluepebble-32fde7d3.westeurope.azurecontainerapps.io/healthz"
          echo "Polling $URL (up to 10 × 30s = 5 min)..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Live smoke test passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 30s..."
            sleep 30
          done
          echo "FAIL: /healthz did not return 200 after 5 minutes"
          exit 1
