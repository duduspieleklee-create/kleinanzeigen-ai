name: CI & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint & basic checks
  # ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check app/

  # ─────────────────────────────────────────────
  # 2. Smoke-test: import all services + start API
  #    Runs on PRs too — blocks build if app is broken.
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite (pytest)
        env:
          DATABASE_URL: "sqlite:///file::memory:?cache=shared"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
          ENVIRONMENT: "test"
        run: pytest -q

      - name: Import check — all three services
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          python -c "from app.api.main import app; print('API OK')"
          python -c "from app.worker.celery_app import celery_app; print('Worker OK')"
          python -c "from app.beat.celery_beat import celery_app; print('Beat OK')"

      - name: Start API and verify /healthz responds 200
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          uvicorn app.api.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/healthz || echo "000")
            [ "$STATUS" = "200" ] && echo "API started (attempt $i)" && break
            sleep 1
          done
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/healthz)
          if [ "$STATUS" != "200" ]; then echo "FAIL: /healthz returned $STATUS"; exit 1; fi
          echo "Smoke test passed"

  # ─────────────────────────────────────────────
  # 2b. Mobile viewport smoke — boots the API, logs in via the dev-only
  #     quick-login route, loads /dashboard at 390px and asserts no
  #     horizontal overflow. Catches responsive regressions the unit
  #     suite and the 1280px browser pass can't see.
  # ─────────────────────────────────────────────
  mobile:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: "ci"
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run Alembic migrations
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
        run: alembic upgrade heads

      - name: Start API
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
          ENVIRONMENT: "test"
        run: |
          uvicorn app.api.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/healthz || echo "000")
            [ "$STATUS" = "200" ] && echo "API started (attempt $i)" && break
            sleep 1
          done

      - name: Mobile viewport check (390px)
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
          ENVIRONMENT: "test"
          BASE_URL: "http://127.0.0.1:8000"
        run: python tests/mobile_viewport_check.py --out "${{ github.workspace }}/dashboard-mobile.png"

      - name: Upload screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-mobile-390px
          path: ${{ github.workspace }}/dashboard-mobile.png

  # ─────────────────────────────────────────────
  # 3. Deploy pipeline — split into named jobs so
  #    GitHub Actions shows each phase separately.
  #    Only on push to main; each job SSHes to the VPS.
  # ─────────────────────────────────────────────

  deploy-pull:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Pull latest code + env + frontend build
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            sudo chown -R debian:debian /opt/kleinanzeigen-ai
            git config --global --add safe.directory /opt/kleinanzeigen-ai
            cd /opt/kleinanzeigen-ai
            git reset --hard
            git clean -fdx
            [ -f .env.example ] && cp -f .env.example .env
            if ! command -v npm >/dev/null 2>&1; then
              sudo apt-get update -y && sudo apt-get install -y nodejs npm
            fi
            git checkout -- .
            git checkout main
            git fetch origin
            git reset --hard origin/main
            touch .env
            upsert_env() {
              local key="$1" val
              val="$(printf '%s' "$2" | tr -d '\r\n')"
              [ -n "$val" ] || return 0
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                printf '\n%s=%s\n' "$key" "$val" >> .env
              fi
            }
            upsert_env ENVIRONMENT "${{ secrets.ENVIRONMENT }}"
            upsert_env SECRET_KEY "${{ secrets.SECRET_KEY }}"
            upsert_env SENDGRID_API_KEY "${{ secrets.SENDGRID_API_KEY }}"
            upsert_env EMAIL_FROM "${{ secrets.EMAIL_FROM }}"
            upsert_env VAPID_PRIVATE_KEY "${{ secrets.VAPID_PRIVATE_KEY }}"
            upsert_env VAPID_PUBLIC_KEY "${{ secrets.VAPID_PUBLIC_KEY }}"
            upsert_env VAPID_EMAIL "${{ secrets.VAPID_EMAIL }}"
            upsert_env GOOGLE_CLIENT_ID "${{ secrets.GOOGLE_CLIENT_ID }}"
            upsert_env GOOGLE_CLIENT_SECRET "${{ secrets.GOOGLE_CLIENT_SECRET }}"
            upsert_env SENTRY_DSN "${{ secrets.SENTRY_DSN }}"
            upsert_env STRIPE_SECRET_KEY "${{ secrets.STRIPE_SECRET_KEY }}"
            upsert_env STRIPE_WEBHOOK_SECRET "${{ secrets.STRIPE_WEBHOOK_SECRET }}"
            upsert_env STRIPE_PRICE_CORE "${{ secrets.STRIPE_PRICE_CORE }}"
            upsert_env STRIPE_PRICE_PRO "${{ secrets.STRIPE_PRICE_PRO }}"
            upsert_env STRIPE_PRICE_CREDITS_500 "${{ secrets.STRIPE_PRICE_CREDITS_500 }}"
            upsert_env STRIPE_PRICE_CREDITS_1500 "${{ secrets.STRIPE_PRICE_CREDITS_1500 }}"
            upsert_env STRIPE_PRICE_CREDITS_5000 "${{ secrets.STRIPE_PRICE_CREDITS_5000 }}"
            upsert_env TURNSTILE_SITE_KEY "${{ secrets.TURNSTILE_SITE_KEY }}"
            upsert_env TURNSTILE_SECRET_KEY "${{ secrets.TURNSTILE_SECRET_KEY }}"
            upsert_env CUSTOM_MODEL_PROVIDER "ollama"
            upsert_env CUSTOM_MODEL_NAME "qwen2.5:1.5b"
            upsert_env CUSTOM_MODEL_ENDPOINT "http://172.17.0.1:11434/v1"
            # Install Ollama on host if missing (runs natively, not in Docker)
            if ! command -v ollama >/dev/null 2>&1; then
              echo "Installing Ollama..."
              curl -fsSL https://ollama.com/install.sh | sudo sh
            fi
            # Make Ollama listen on all interfaces so Docker containers can reach it.
            # The default systemd service binds to 127.0.0.1 only, which is unreachable
            # from inside the API container.
            sudo mkdir -p /etc/systemd/system/ollama.service.d
            printf '[Service]\nEnvironment="OLLAMA_HOST=0.0.0.0:11434"\n' | sudo tee /etc/systemd/system/ollama.service.d/override.conf >/dev/null
            sudo systemctl daemon-reload
            # Ensure ollama systemd service is running and uses the new binding
            if sudo systemctl is-active --quiet ollama 2>/dev/null; then
              sudo systemctl restart ollama
            else
              sudo systemctl enable --now ollama
            fi
            # Pull model if not already loaded
            if ! ollama list 2>/dev/null | grep -q "qwen2.5:1.5b"; then
              echo "Pulling qwen2.5:1.5b..."
              ollama pull qwen2.5:1.5b
            fi
            # Verify Ollama is listening on 0.0.0.0 (or at least not only 127.0.0.1)
            echo "Checking Ollama bind address..."
            if ss -tlnp | grep -q '0.0.0.0:11434\|\*:11434\|:::11434'; then
              echo "✓ Ollama listening on all interfaces"
            else
              echo "✗ Ollama is not listening on all interfaces. Current bindings:"
              ss -tlnp | grep 11434 || true
              exit 1
            fi
            export GIT_SHA="${{ github.sha }}"
            export BUILD_NUMBER="${{ github.run_number }}"
            export BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            APP_VERSION="$(grep -m1 '^version' pyproject.toml | sed -E 's/version = \"(.*)\"/\1/')"
            # Persist build info for downstream jobs via a marker file
            printf 'GIT_SHA=%s\nBUILD_NUMBER=%s\nBUILD_TIME=%s\nAPP_VERSION=%s\n' \
              "$GIT_SHA" "$BUILD_NUMBER" "$BUILD_TIME" "$APP_VERSION" \
              > /opt/kleinanzeigen-ai/.build_info
            cd frontend && npm ci && npm run build && cd ..
            echo "deploy-pull complete (sha=$GIT_SHA build=$BUILD_NUMBER)"

  deploy-build:
    runs-on: ubuntu-latest
    needs: deploy-pull
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Build Docker images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/kleinanzeigen-ai
            # Source build info from deploy-pull (GIT_SHA, BUILD_NUMBER, etc.)
            if [ -f .build_info ]; then . ./.build_info; fi
            export GIT_SHA="${GIT_SHA:-${{ github.sha }}}"
            export BUILD_NUMBER="${BUILD_NUMBER:-${{ github.run_number }}}"
            export BUILD_TIME="${BUILD_TIME:-$(date -u +%Y-%m-%dT%H:%M:%SZ)}"
            export APP_VERSION="${APP_VERSION:-$(grep -m1 '^version' pyproject.toml | sed -E 's/version = \"(.*)\"/\1/')}"
            docker compose -f docker-compose.prod.yml build \
              --build-arg GIT_SHA="$GIT_SHA" \
              --build-arg BUILD_NUMBER="$BUILD_NUMBER" \
              --build-arg APP_VERSION="$APP_VERSION" \
              --build-arg BUILD_TIME="$BUILD_TIME" \
              api
            echo "deploy-build complete (sha=$GIT_SHA)"

  deploy-migrate:
    runs-on: ubuntu-latest
    needs: deploy-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Run Alembic migrations
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/kleinanzeigen-ai
            if [ -f .env ]; then set -a; . .env; set +a; fi
            docker compose -f docker-compose.prod.yml run --rm api alembic upgrade heads
            echo "deploy-migrate complete"

  deploy-restart:
    runs-on: ubuntu-latest
    needs: deploy-migrate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/kleinanzeigen-ai
            docker compose -f docker-compose.prod.yml up -d
            echo "deploy-restart complete"

  deploy-smoke:
    runs-on: ubuntu-latest
    needs: deploy-restart
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Smoke checks (healthz + version)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/kleinanzeigen-ai
            # Read build info written by deploy-pull
            if [ -f .build_info ]; then . ./.build_info; fi
            GIT_SHA="${GIT_SHA:-${{ github.sha }}}"
            BUILD_NUMBER="${BUILD_NUMBER:-${{ github.run_number }}}"
            APP_VERSION="${APP_VERSION:-dev}"
            # Wait for API
            for i in $(seq 1 60); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8000/healthz" 2>/dev/null || echo "000")
              [ "$STATUS" = "200" ] && break
              sleep 2
            done
            HEALTH=$(curl -s "http://127.0.0.1:8000/healthz" 2>/dev/null || echo '{}')
            VERSION=$(curl -s "http://127.0.0.1:8000/version" 2>/dev/null || echo '{}')
            echo "$HEALTH" | grep -q '"status":"ok"' || { echo "FAIL: /healthz not ok: $HEALTH"; exit 1; }
            echo "$VERSION" | grep -q "\"commit\":\"${GIT_SHA}\"" || { echo "FAIL: commit mismatch got=$VERSION expected=$GIT_SHA"; exit 1; }
            echo "deploy-smoke complete: healthz=ok sha=$GIT_SHA"

  deploy-llm:
    runs-on: ubuntu-latest
    needs: deploy-smoke
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: LLM self-healing checks
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            echo "=== LLM Audit ==="
            echo ""

            # ── 1. Host-level Ollama check ──
            echo "--- 1. Ollama host check ---"
            echo "Checking ollama process:"
            ps aux | grep ollama | grep -v grep || echo "  NO ollama process found"

            echo "Checking port 11434:"
            ss -tlnp | grep 11434 || echo "  NOTHING listening on 11434"

            echo "Trying curl http://127.0.0.1:11434/api/tags:"
            for i in $(seq 1 10); do
              STATUS=$(curl -s -o /tmp/ollama_tags.json -w "%{http_code}" "http://127.0.0.1:11434/api/tags" 2>/tmp/ollama_curl_err || echo "000")
              echo "  attempt $i → HTTP $STATUS"
              [ "$STATUS" = "200" ] && break
              cat /tmp/ollama_curl_err 2>/dev/null
              sleep 3
            done

            if [ "$STATUS" != "200" ]; then
              echo "✗ Ollama not reachable on host (HTTP $STATUS). Full response:"
              cat /tmp/ollama_tags.json 2>/dev/null
              exit 1
            fi
            echo "✓ Ollama host OK"

            # ── 2. Model check ──
            echo ""
            echo "--- 2. Model check ---"
            TAGS=$(cat /tmp/ollama_tags.json 2>/dev/null || echo '{}')
            echo "Ollama /api/tags response:"
            echo "$TAGS" | python3 -m json.tool 2>/dev/null || echo "$TAGS"
            MODEL_COUNT=$(echo "$TAGS" | grep -o '"name"' | wc -l)
            echo "Models found: $MODEL_COUNT"
            echo "$TAGS" | grep -q "qwen2.5" && echo "✓ qwen2.5:1.5b found" || { echo "✗ qwen2.5:1.5b MISSING"; exit 1; }

            # ── 3. API /chat endpoint check ──
            echo ""
            echo "--- 3. /chat endpoint audit ---"
            echo "API version:"
            curl -s "http://127.0.0.1:8000/version" | python3 -m json.tool 2>/dev/null

            # /api/ai-search/chat is authenticated (see #355). The public login
            # form is Turnstile-guarded and can't be driven from CI, so mint a
            # short-lived Bearer token directly with the API's own signing key
            # (SECRET_KEY) for an existing active user, inside the api container.
            cd /opt/kleinanzeigen-ai
            TOKEN=$(docker compose -f docker-compose.prod.yml exec -T api python -c '
            from datetime import timedelta
            from app.api.dependencies import create_access_token
            from app.shared.database import SessionLocal
            from app.shared.models import User
            db = SessionLocal()
            u = db.query(User).filter(User.is_active == 1).order_by(User.id).first()
            print(create_access_token(data={"sub": str(u.id), "username": u.username}, expires_delta=timedelta(minutes=5)))
            ' 2>/tmp/token_err | tr -d '\r\n')
            if [ -z "$TOKEN" ]; then
              echo "✗ Could not mint an auth token in the api container:"
              cat /tmp/token_err 2>/dev/null
              exit 1
            fi
            echo "✓ Auth token minted"

            echo ""
            echo "Calling /chat with full debug:"
            for attempt in $(seq 1 10); do
              echo "  --- attempt $attempt ---"
              RESP=$(curl -s -w "\n%{http_code}" "http://127.0.0.1:8000/api/ai-search/chat" \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer $TOKEN" \
                -d '{"messages":[{"role":"user","content":"ping"}]}' 2>/tmp/chat_curl_err)
              HTTP_CODE=$(echo "$RESP" | tail -1)
              BODY=$(echo "$RESP" | sed '$d')
              echo "  HTTP: $HTTP_CODE"
              echo "  Body: $BODY" | head -5

              LLM_CONNECTED=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('llm_connected','N/A'))" 2>/dev/null || echo "parse_error")
              MODEL_NAME=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('model_name','N/A'))" 2>/dev/null || echo "parse_error")
              LLM_ERROR=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('llm_error','N/A'))" 2>/dev/null || echo "parse_error")

              echo "  llm_connected: $LLM_CONNECTED"
              echo "  model_name: $MODEL_NAME"
              echo "  llm_error: $LLM_ERROR"

              if [ "$LLM_CONNECTED" = "True" ]; then
                echo ""
                echo "✓✓✓ LLM CONNECTED — model: $MODEL_NAME ✓✓✓"
                exit 0
              fi
              sleep 3
            done

            echo ""
            echo "✗✗✗ LLM audit FAILED after 10 retries ✗✗✗"
            echo "Full last response:"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            exit 1
