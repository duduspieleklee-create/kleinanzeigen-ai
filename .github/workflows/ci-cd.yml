name: CI & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint & basic checks
  # ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check app/

  # ─────────────────────────────────────────────
  # 2. Smoke-test: import all services + start API
  #    Runs on PRs too — blocks build if app is broken.
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite (pytest)
        env:
          DATABASE_URL: "sqlite:///file::memory:?cache=shared"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
          ENVIRONMENT: "test"
        run: pytest -q

      - name: Import check — all three services
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          python -c "from app.api.main import app; print('API OK')"
          python -c "from app.worker.celery_app import celery_app; print('Worker OK')"
          python -c "from app.beat.celery_beat import celery_app; print('Beat OK')"

      - name: Start API and verify /healthz responds 200
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          uvicorn app.api.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/healthz || echo "000")
            [ "$STATUS" = "200" ] && echo "API started (attempt $i)" && break
            sleep 1
          done
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/healthz)
          if [ "$STATUS" != "200" ]; then echo "FAIL: /healthz returned $STATUS"; exit 1; fi
          echo "Smoke test passed"

  # ─────────────────────────────────────────────
  # 2b. Mobile viewport smoke — boots the API, logs in via the dev-only
  #     quick-login route, loads /dashboard at 390px and asserts no
  #     horizontal overflow. Catches responsive regressions the unit
  #     suite and the 1280px browser pass can't see.
  # ─────────────────────────────────────────────
  mobile:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: "ci"
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run Alembic migrations
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
        run: alembic upgrade heads

      - name: Start API
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
          ENVIRONMENT: "test"
        run: |
          uvicorn app.api.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/healthz || echo "000")
            [ "$STATUS" = "200" ] && echo "API started (attempt $i)" && break
            sleep 1
          done

      - name: Mobile viewport check (390px)
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
          ENVIRONMENT: "test"
          BASE_URL: "http://127.0.0.1:8000"
        run: python tests/mobile_viewport_check.py --out "${{ github.workspace }}/dashboard-mobile.png"

      - name: Upload screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-mobile-390px
          path: ${{ github.workspace }}/dashboard-mobile.png

  # ─────────────────────────────────────────────
  # 3. Deploy pipeline — split into named jobs so
  #    GitHub Actions shows each phase separately.
  #    Only on push to main; each job SSHes to the VPS.
  # ─────────────────────────────────────────────

  deploy-pull:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Pull latest code + env + frontend build
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            git config --global --add safe.directory /opt/kleinanzeigen-ai
            cd /opt/kleinanzeigen-ai
            git reset --hard
            git clean -fdx
            [ -f .env.example ] && cp -f .env.example .env
            if ! command -v npm >/dev/null 2>&1; then
              sudo apt-get update -y && sudo apt-get install -y nodejs npm
            fi
            git checkout -- .
            git checkout main
            git fetch origin
            git reset --hard origin/main
            touch .env
            upsert_env() {
              local key="$1" val
              val="$(printf '%s' "$2" | tr -d '\r\n')"
              [ -n "$val" ] || return 0
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                printf '\n%s=%s\n' "$key" "$val" >> .env
              fi
            }
            upsert_env RESEND_API_KEY "${{ secrets.RESEND_API_KEY }}"
            upsert_env EMAIL_FROM "${{ secrets.EMAIL_FROM }}"
            upsert_env TURNSTILE_SITE_KEY "${{ secrets.TURNSTILE_SITE_KEY }}"
            upsert_env TURNSTILE_SECRET_KEY "${{ secrets.TURNSTILE_SECRET_KEY }}"
            upsert_env CUSTOM_MODEL_PROVIDER "ollama"
            upsert_env CUSTOM_MODEL_NAME "qwen2.5:1.5b"
            upsert_env CUSTOM_MODEL_ENDPOINT "http://ollama:11434/v1"
            export GIT_SHA="${{ github.sha }}"
            export BUILD_NUMBER="${{ github.run_number }}"
            export BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            APP_VERSION="$(grep -m1 '^version' pyproject.toml | sed -E 's/version = \"(.*)\"/\1/')"
            # Persist build info for downstream jobs via a marker file
            printf 'GIT_SHA=%s\nBUILD_NUMBER=%s\nBUILD_TIME=%s\nAPP_VERSION=%s\n' \
              "$GIT_SHA" "$BUILD_NUMBER" "$BUILD_TIME" "$APP_VERSION" \
              > /opt/kleinanzeigen-ai/.build_info
            cd frontend && npm ci && npm run build && cd ..
            echo "deploy-pull complete (sha=$GIT_SHA build=$BUILD_NUMBER)"

  deploy-build:
    runs-on: ubuntu-latest
    needs: deploy-pull
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Build Docker images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/kleinanzeigen-ai
            docker compose -f docker-compose.prod.yml build api
            echo "deploy-build complete"

  deploy-migrate:
    runs-on: ubuntu-latest
    needs: deploy-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Run Alembic migrations
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/kleinanzeigen-ai
            if [ -f .env ]; then set -a; . .env; set +a; fi
            docker compose -f docker-compose.prod.yml run --rm api alembic upgrade heads
            echo "deploy-migrate complete"

  deploy-restart:
    runs-on: ubuntu-latest
    needs: deploy-migrate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/kleinanzeigen-ai
            docker compose -f docker-compose.prod.yml up -d --build
            echo "deploy-restart complete"

  deploy-smoke:
    runs-on: ubuntu-latest
    needs: deploy-restart
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Smoke checks (healthz + version)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/kleinanzeigen-ai
            # Read build info written by deploy-pull
            if [ -f .build_info ]; then . ./.build_info; fi
            GIT_SHA="${GIT_SHA:-${{ github.sha }}}"
            BUILD_NUMBER="${BUILD_NUMBER:-${{ github.run_number }}}"
            APP_VERSION="${APP_VERSION:-dev}"
            # Wait for API
            for i in $(seq 1 60); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8000/healthz" 2>/dev/null || echo "000")
              [ "$STATUS" = "200" ] && break
              sleep 2
            done
            HEALTH=$(curl -s "http://127.0.0.1:8000/healthz" 2>/dev/null || echo '{}')
            VERSION=$(curl -s "http://127.0.0.1:8000/version" 2>/dev/null || echo '{}')
            echo "$HEALTH" | grep -q '"status":"ok"' || { echo "FAIL: /healthz not ok: $HEALTH"; exit 1; }
            echo "$VERSION" | grep -q "\"commit\":\"${GIT_SHA}\"" || { echo "FAIL: commit mismatch got=$VERSION expected=$GIT_SHA"; exit 1; }
            echo "deploy-smoke complete: healthz=ok sha=$GIT_SHA"

  deploy-llm:
    runs-on: ubuntu-latest
    needs: deploy-smoke
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: LLM self-healing checks
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/kleinanzeigen-ai
            echo "=== LLM Self-Healing ==="
            EXPECTED_MODEL="qwen2.5:1.5b"
            # 1. Wait for Ollama
            for i in $(seq 1 30); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:11434/api/tags" 2>/dev/null || echo "000")
              [ "$STATUS" = "200" ] && echo "Ollama ready (attempt $i)" && break
              sleep 5
            done
            # 2. Auto-pull model if missing
            TAGS=$(curl -s "http://127.0.0.1:11434/api/tags" 2>/dev/null || echo '{"models":[]}')
            MODEL_COUNT=$(echo "$TAGS" | grep -o '"name":"[^"]*"' | wc -l)
            HAS=$(echo "$TAGS" | grep -q "\"name\":\"${EXPECTED_MODEL}" && echo true || echo false)
            if [ "$MODEL_COUNT" -eq 0 ] || [ "$HAS" != "true" ]; then
              echo "Model '$EXPECTED_MODEL' missing — pulling..."
              docker compose -f docker-compose.prod.yml exec -T ollama ollama pull "$EXPECTED_MODEL"
              TAGS=$(curl -s "http://127.0.0.1:11434/api/tags" 2>/dev/null || echo '{"models":[]}')
              HAS=$(echo "$TAGS" | grep -q "\"name\":\"${EXPECTED_MODEL}" && echo true || echo false)
              [ "$HAS" != "true" ] && { echo "✗ Auto-pull failed"; exit 1; }
            fi
            echo "Model '$EXPECTED_MODEL' loaded ✓"
            # 3. Verify chat endpoint
            chase_llm() {
              for attempt in $(seq 1 10); do
                RESP=$(curl -s "http://127.0.0.1:8000/api/ai-search/chat" \
                  -H "Content-Type: application/json" \
                  -d '{"messages":[{"role":"user","content":"ping"}]}' 2>/dev/null || echo '{}')
                CONNECTED=$(echo "$RESP" | grep -o '"llm_connected":[^,}]*' | cut -d: -f2)
                MODEL=$(echo "$RESP" | grep -o '"model_name":"[^"]*"' | cut -d'"' -f4)
                [ "$CONNECTED" = "true" ] && echo "✓ LLM connected — $MODEL" && return 0
                sleep 3
              done
              return 1
            }
            if ! chase_llm; then
              echo "✗ LLM still not connected after 10 retries"
              exit 1
            fi
            echo "deploy-llm complete"
