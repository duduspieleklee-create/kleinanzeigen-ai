name: CI & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint & basic checks
  # ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check app/

  # ─────────────────────────────────────────────
  # 2. Smoke-test: import all services + start API
  #    Runs on PRs too — blocks build if app is broken.
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite (pytest)
        env:
          DATABASE_URL: "sqlite:///file::memory:?cache=shared"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
          ENVIRONMENT: "test"
        run: pytest -q

      - name: Import check — all three services
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          python -c "from app.api.main import app; print('API OK')"
          python -c "from app.worker.celery_app import celery_app; print('Worker OK')"
          python -c "from app.beat.celery_beat import celery_app; print('Beat OK')"

      - name: Start API and verify /healthz responds 200
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          uvicorn app.api.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/healthz || echo "000")
            [ "$STATUS" = "200" ] && echo "API started (attempt $i)" && break
            sleep 1
          done
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/healthz)
          if [ "$STATUS" != "200" ]; then echo "FAIL: /healthz returned $STATUS"; exit 1; fi
          echo "Smoke test passed"

  # ─────────────────────────────────────────────
  # 2b. Mobile viewport smoke — boots the API, logs in via the dev-only
  #     quick-login route, loads /dashboard at 390px and asserts no
  #     horizontal overflow. Catches responsive regressions the unit
  #     suite and the 1280px browser pass can't see.
  # ─────────────────────────────────────────────
  mobile:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: "ci"
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run Alembic migrations
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
        run: alembic upgrade heads

      - name: Start API
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
          ENVIRONMENT: "test"
        run: |
          uvicorn app.api.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/healthz || echo "000")
            [ "$STATUS" = "200" ] && echo "API started (attempt $i)" && break
            sleep 1
          done

      - name: Mobile viewport check (390px)
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          SECRET_KEY: "ci-test-secret"
          REDIS_URL: "redis://localhost:6379/0"
          ENVIRONMENT: "test"
          BASE_URL: "http://127.0.0.1:8000"
        run: python tests/mobile_viewport_check.py --out "${{ github.workspace }}/dashboard-mobile.png"

      - name: Upload screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-mobile-390px
          path: ${{ github.workspace }}/dashboard-mobile.png

  # ─────────────────────────────────────────────
  # 3. Deploy — SSH into the VPS, pull, migrate, restart.
  #    Only on a push to main (never on PRs); requires VPS_HOST,
  #    VPS_USER and VPS_SSH_PASSWORD secrets (see docs/vps-deployment.md).
  #    Also injects RESEND_API_KEY, EMAIL_FROM and the TURNSTILE_* keys into
  #    /opt/kleinanzeigen-ai/.env (all optional — skipped if the secret is unset).
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            # Ensure Git trusts the deployment directory regardless of the user running the SSH session
            git config --global --add safe.directory /opt/kleinanzeigen-ai
            cd /opt/kleinanzeigen-ai
            # Ensure a clean working tree – discard any local changes or untracked files
            git reset --hard
            git clean -fdx
            # Restore .env from template if needed (preserve configuration across deploys)
            if [ -f .env.example ]; then
              cp -f .env.example .env
            fi
            # Install Node/npm if missing (requires sudo)
            if ! command -v npm >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y nodejs npm
            fi


            # Discard any uncommitted tracked changes on the VPS so the
            # subsequent `git checkout main` can't abort on a dirty tree
            # (e.g. a server-side edit left uncommitted). The VPS working
            # tree must always reflect the committed SHA; real changes
            # belong in a PR, not the deploy target.
            #
            # Then do a hard reset to origin/main instead of `git pull`.
            # `git pull` aborts with "divergent branches" (exit 128) when the
            # VPS `main` carries a local commit not on the remote, which
            # breaks the whole deploy. `git fetch` + `reset --hard` makes the
            # VPS reflect the exact committed SHA regardless of local commits.
            git checkout -- .
            git checkout main
            git fetch origin
            git reset --hard origin/main
            # Upsert a KEY=VALUE line into .env. tr strips any CR/LF so a stray
            # trailing newline in a GitHub secret can't corrupt the file (a
            # newline pasted into the secret would otherwise split the line).
            # Empty/whitespace-only secrets are skipped, leaving .env untouched.
            # Ensure .env exists before upserting secrets
            touch .env
            upsert_env() {
              local key="$1" val
              val="$(printf '%s' "$2" | tr -d '\r\n')"
              [ -n "$val" ] || return 0
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                printf '\n%s=%s\n' "$key" "$val" >> .env
              fi
            }
            upsert_env RESEND_API_KEY "${{ secrets.RESEND_API_KEY }}"
            upsert_env EMAIL_FROM "${{ secrets.EMAIL_FROM }}"
            upsert_env TURNSTILE_SITE_KEY "${{ secrets.TURNSTILE_SITE_KEY }}"
            upsert_env TURNSTILE_SECRET_KEY "${{ secrets.TURNSTILE_SECRET_KEY }}"
            # Export DATABASE_URL constructed from POSTGRES creds (from .env or defaults)
            export DATABASE_URL="postgresql://${POSTGRES_USER:-kleinanzeigen}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-kleinanzeigen_ai}"
            export GIT_SHA="${{ github.sha }}"
            export BUILD_NUMBER="${{ github.run_number }}"
            export BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            export APP_VERSION="$(grep -m1 '^version' pyproject.toml | sed -E 's/version = "(.*)"/\1/')"
            # Build frontend assets (Vite) — produces app/api/static/main.js + style.css
            cd frontend && npm ci && npm run build && cd ..
            docker compose -f docker-compose.prod.yml build api
            # Load environment variables from .env if present
            if [ -f .env ]; then
              set -a
              . .env
              set +a
            fi
            docker compose -f docker-compose.prod.yml run --rm api alembic upgrade heads
            docker compose -f docker-compose.prod.yml up -d --build

            # Post-deploy smoke checks: must match the new build args.
            EXPECTED_GIT_SHA="$GIT_SHA"
            EXPECTED_APP_VERSION="$APP_VERSION"
            EXPECTED_BUILD_NUMBER="$BUILD_NUMBER"
            for i in $(seq 1 60); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8000/healthz" 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                break
              fi
              sleep 2
            done
            HEALTH=$(curl -s "http://127.0.0.1:8000/healthz" 2>/dev/null || echo '{}')
            VERSION=$(curl -s "http://127.0.0.1:8000/version" 2>/dev/null || echo '{}')
            if ! echo "$HEALTH" | grep -q '"status":"ok"'; then
              echo "FAIL: /healthz did not return ok: $HEALTH"; exit 1
            fi
            if ! echo "$VERSION" | grep -q "\"commit\":\"${EXPECTED_GIT_SHA}\""; then
              echo "FAIL: /version commit mismatch. got=$VERSION expected=$EXPECTED_GIT_SHA"; exit 1
            fi
            if ! echo "$VERSION" | grep -q "\"version\":\"${EXPECTED_APP_VERSION}\""; then
              echo "FAIL: /version version mismatch. got=$VERSION expected=$EXPECTED_APP_VERSION"; exit 1
            fi
            if ! echo "$VERSION" | grep -q "\"build\":\"${EXPECTED_BUILD_NUMBER}\""; then
              echo "FAIL: /version build mismatch. got=$VERSION expected=$EXPECTED_BUILD_NUMBER"; exit 1
            fi
            echo "Deploy smoke checks passed: healthz=ok version=$VERSION"

            # ── LLM self-healing checks ─────────────────────────
            # Waits for Ollama, auto-pulls model if missing, then
            # verifies the /chat endpoint returns llm_connected=true.
            # Only fails if self-healing doesn't resolve the issue.
            echo ""
            echo "=== LLM Self-Healing Checks ==="
            EXPECTED_MODEL="${OLLAMA_MODEL:-qwen2.5:1.5b}"

            # 1. Wait for Ollama service to be ready
            for i in $(seq 1 30); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:11434/api/tags" 2>/dev/null || echo "000")
              [ "$STATUS" = "200" ] && echo "Ollama ready (attempt $i)" && break
              sleep 5
            done

            # 2. Check models — auto-pull if missing
            OLLAMA_TAGS=$(curl -s "http://127.0.0.1:11434/api/tags" 2>/dev/null || echo '{"models":[]}')
            MODEL_COUNT=$(echo "$OLLAMA_TAGS" | grep -o '"name":"[^"]*"' | wc -l)
            HAS_EXPECTED=$(echo "$OLLAMA_TAGS" | grep -q "\"name\":\"${EXPECTED_MODEL}" && echo true || echo false)

            if [ "$MODEL_COUNT" -eq 0 ] || [ "$HAS_EXPECTED" != "true" ]; then
              echo "Model '$EXPECTED_MODEL' not loaded — pulling now..."
              docker compose -f docker-compose.prod.yml exec -T ollama ollama pull "$EXPECTED_MODEL"
              echo "Pull complete. Verifying..."
              OLLAMA_TAGS=$(curl -s "http://127.0.0.1:11434/api/tags" 2>/dev/null || echo '{"models":[]}')
              HAS_EXPECTED=$(echo "$OLLAMA_TAGS" | grep -q "\"name\":\"${EXPECTED_MODEL}" && echo true || echo false)
              if [ "$HAS_EXPECTED" != "true" ]; then
                echo "✗ Auto-pull failed — model '$EXPECTED_MODEL' still missing"
                exit 1
              fi
            fi
            echo "Model '$EXPECTED_MODEL' loaded ✓"

            # 3. Test /chat LLM connectivity — retry once after self-heal
            chase_llm() {
              for attempt in $(seq 1 10); do
                RESP=$(curl -s "http://127.0.0.1:8000/api/ai-search/chat" \
                  -H "Content-Type: application/json" \
                  -d '{"messages":[{"role":"user","content":"ping"}]}' 2>/dev/null || echo '{}')
                CONNECTED=$(echo "$RESP" | grep -o '"llm_connected":[^,}]*' | cut -d: -f2)
                MODEL=$(echo "$RESP" | grep -o '"model_name":"[^"]*"' | cut -d'"' -f4)
                [ "$CONNECTED" = "true" ] && echo "✓ LLM connected — model: $MODEL" && return 0
                sleep 3
              done
              return 1
            }

            if chase_llm; then
              echo "=== LLM checks passed ==="
            else
              echo "✗ LLM still not connected after 10 retries"
              echo "  response: $RESP"
              exit 1
            fi
