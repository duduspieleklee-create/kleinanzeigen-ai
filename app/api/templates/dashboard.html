<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - kleinanzeigen-ai</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 40px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 24px; }
        input[type="text"], input[type="number"] {
            width: 100%; padding: 10px; margin: 6px 0 16px; border: 1px solid #ccc;
            border-radius: 4px; box-sizing: border-box;
        }
        label { font-weight: bold; display: block; margin-top: 8px; }
        button[type="submit"] {
            width: 100%; background: #007bff; color: white; padding: 12px;
            border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 8px;
        }
        button[type="submit"]:hover { background: #0056b3; }
        .results-link { display: block; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>New Scrape Job</h2>
        <form action="/scrapes/submit" method="post">
            <label for="keywords">Keywords</label>
            <input type="text" id="keywords" name="keywords" placeholder="e.g. handwerker">

            <label for="category">Category</label>
            <input type="text" id="category" name="category" placeholder="e.g. handwerk">

            <label for="location">Location</label>
            <input type="text" id="location" name="location" placeholder="e.g. berlin">

            <label for="price_max">Max Price (€)</label>
            <input type="number" id="price_max" name="price_max" placeholder="e.g. 200">

            <button type="submit">Start Scrape</button>
        </form>
        <a class="results-link" href="/scrapes/results">View My Results →</a>
    </div>
</body>
</html>
