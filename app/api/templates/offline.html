<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — kleinanzeigen-ai</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#007bff">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="offline-page">
    <div class="offline-card">
        <h2>Connection lost</h2>
        <p>kleinanzeigen-ai couldn't reach the server. You may be offline, or the server may be restarting.</p>
        <p>This page retries automatically and reloads as soon as the connection is back.</p>
        <a href="/dashboard" class="retry-btn">Try again</a>
    </div>
    <script>
        // Reload the originally requested page as soon as connectivity returns.
        window.addEventListener('online', function () { location.reload(); });
        setInterval(function () {
            fetch('/healthz', { cache: 'no-store' })
                .then(function (r) { if (r.ok) location.reload(); })
                .catch(function () {});
        }, 5000);
    </script>
</body>
</html>
