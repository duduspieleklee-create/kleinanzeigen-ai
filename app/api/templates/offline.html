<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — kleinanzeigen-ai</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 40px;
               display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 8px;
                box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 400px; text-align: center; }
        h2 { margin-top: 0; }
        p { color: #666; line-height: 1.5; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .retry-btn { display: inline-block; margin-top: 16px; padding: 10px 24px;
                     background: #007bff; color: white; border-radius: 4px; }
        .retry-btn:hover { background: #0056b3; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>You're offline</h2>
        <p>kleinanzeigen-ai needs a network connection to show your searches and results.</p>
        <p>Check your connection, then try again.</p>
        <a href="/dashboard" class="retry-btn">Try again</a>
    </div>
</body>
</html>
