<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrieren - kleinanzeigen-ai</title>
    <meta name="description" content="Erstelle ein Konto bei kleinanzeigen-ai, um automatische Benachrichtigungen für deine kleinanzeigen.de-Suchen einzurichten.">
    <link rel="canonical" href="https://kleeblatt.space/auth/register">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#007bff">
    <link rel="stylesheet" href="/static/style.css?v={{ build_info.commit_short }}">
    {% if turnstile_site_key %}
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    {% endif %}

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kleeblatt.space/auth/register">
    <meta property="og:title" content="Registrieren - kleinanzeigen-ai">
    <meta property="og:description" content="Erstelle ein Konto bei kleinanzeigen-ai, um automatische Benachrichtigungen für deine kleinanzeigen.de-Suchen einzurichten.">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary">
    <meta property="twitter:url" content="https://kleeblatt.space/auth/register">
    <meta property="twitter:title" content="Registrieren - kleinanzeigen-ai">
    <meta property="twitter:description" content="Erstelle ein Konto bei kleinanzeigen-ai, um automatische Benachrichtigungen für deine kleinanzeigen.de-Suchen einzurichten.">
</head>
<body class="auth-page">
    <div class="register-container">
        <h2>kleinanzeigen-ai</h2>
        <p class="subtitle">Erstelle dein Konto</p>

        <form method="post" action="/auth/register">
            <div class="form-group">
                <label for="username">Benutzername</label>
                <input type="text" id="username" name="username"
                       value="{{ username if username is defined else '' }}"
                       autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="email">E-Mail</label>
                <input type="email" id="email" name="email"
                       value="{{ email if email is defined else '' }}"
                       autocomplete="email" required>
            </div>
            <div class="form-group password-field">
                <label for="password">Passwort</label>
                <input type="password" id="password" name="password" autocomplete="new-password" required>
                <button type="button" class="password-toggle" data-target="password" aria-label="Passwort anzeigen">Anzeigen</button>
                <p class="hint" style="margin-top: 4px;">Mindestens 8 Zeichen</p>
            </div>
            <div class="form-group password-field">
                <label for="confirm_password">Passwort bestätigen</label>
                <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" required>
                <button type="button" class="password-toggle" data-target="confirm_password" aria-label="Passwort bestätigen anzeigen">Anzeigen</button>
            </div>
            {% if turnstile_site_key %}
            <div class="cf-turnstile" data-sitekey="{{ turnstile_site_key }}" data-theme="auto"></div>
            {% endif %}
            <button type="submit" class="register-btn">Konto erstellen</button>
        </form>

        {% if error is defined and error %}
        <p class="error-msg">{{ error }}</p>
        {% endif %}

        {% if google_enabled %}
        <div class="divider"><span>oder</span></div>
        <a class="google-btn" href="/auth/google/login">
            <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Mit Google registrieren
        </a>
        {% endif %}

        <p class="login-link">Bereits ein Konto? <a href="/login">Anmelden</a></p>
    </div>

    <script>
        // Register the service worker so the app is installable as a PWA
        // from the very first page, before the user logs in.
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(function () {});
        }

        // Password show/hide toggle logic
        document.querySelectorAll('.password-toggle').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var input = document.getElementById(btn.dataset.target);
                if (!input) return;
                var showing = input.type === 'text';
                input.type = showing ? 'password' : 'text';
                btn.textContent = showing ? 'Anzeigen' : 'Verbergen';
                btn.setAttribute('aria-label', showing ? 'Passwort anzeigen' : 'Passwort verbergen');
            });
        });
    </script>
</body>
</html>
