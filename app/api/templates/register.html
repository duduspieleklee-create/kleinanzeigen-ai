<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - kleinanzeigen-ai</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#007bff">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
    <div class="register-container">
        <h2>kleinanzeigen-ai</h2>
        <p class="subtitle">Create your account</p>

        <form method="post" action="/auth/register">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                       value="{{ username if username is defined else '' }}"
                       autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email"
                       value="{{ email if email is defined else '' }}"
                       autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="new-password" required>
                <p class="hint">Minimum 8 characters</p>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm password</label>
                <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" required>
            </div>
            <button type="submit" class="register-btn">Create account</button>
        </form>

        {% if error is defined and error %}
        <p class="error-msg">{{ error }}</p>
        {% endif %}

        <p class="login-link">Already have an account? <a href="/">Sign in</a></p>
    </div>


    <script>
        // Register the service worker so the app is installable as a PWA
        // from the very first page, before the user logs in.
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(function () {});
        }
    </script>
</body>
</html>
