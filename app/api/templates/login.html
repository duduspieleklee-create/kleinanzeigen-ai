<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - kleinanzeigen-ai</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="KA-AI">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        h2 { margin-bottom: 8px; }
        .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
        .form-group {
            text-align: left;
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 4px;
        }
        input[type="text"], input[type="password"], input[type="email"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 15px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 2px rgba(0,123,255,0.15);
        }
        .login-btn {
            width: 100%;
            padding: 11px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
        }
        .login-btn:hover { background-color: #0069d9; }
        .error-msg {
            color: #d93025;
            margin-top: 14px;
            font-size: 14px;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #999;
            font-size: 13px;
            margin: 20px 0;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #eee;
        }
        .divider span { padding: 0 12px; }
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 11px;
            background: #fff;
            color: #444;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
            box-sizing: border-box;
        }
        .google-btn:hover { background: #f7f7f7; }
        .register-link {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .register-link a {
            color: #007bff;
            text-decoration: none;
        }
        .register-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>kleinanzeigen-ai</h2>
        <p class="subtitle">Sign in to start scraping</p>

        <form method="post" action="/auth/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="login-btn">Sign in</button>
        </form>

        {% if error is defined and error %}
        <p class="error-msg">{{ error }}</p>
        {% endif %}

        {% if google_enabled %}
        <div class="divider"><span>or</span></div>
        <a href="/auth/google/login" class="google-btn">Sign in with Google</a>
        {% endif %}

        <p class="register-link">Don't have an account? <a href="/auth/register">Register</a></p>
    </div>

    {% include "_version_footer.html" %}

    <script>
        // Register the service worker so the app is installable as a PWA
        // from the very first page, before the user logs in.
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(function () {});
        }
    </script>
</body>
</html>
