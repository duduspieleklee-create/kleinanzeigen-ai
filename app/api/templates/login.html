<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - kleinanzeigen-ai</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="KA-AI">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
    <div class="login-container">
        <h2>kleinanzeigen-ai</h2>
        <p class="subtitle">Sign in to start scraping</p>

        <form method="post" action="/auth/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="login-btn">Sign in</button>
        </form>

        {% if error is defined and error %}
        <p class="error-msg">{{ error }}</p>
        {% endif %}

        {% if google_enabled %}
        <div class="divider"><span>or</span></div>
        <a href="/auth/google/login" class="google-btn">Sign in with Google</a>
        {% endif %}

        <p class="register-link">Don't have an account? <a href="/auth/register">Register</a></p>
    </div>

    {% include "_version_footer.html" %}

    <script>
        // Register the service worker so the app is installable as a PWA
        // from the very first page, before the user logs in.
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(function () {});
        }
    </script>
</body>
</html>
