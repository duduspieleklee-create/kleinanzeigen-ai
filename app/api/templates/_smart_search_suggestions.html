{# Reusable Smart Search Suggestions partial.
   Requires: an input element with id="smart-search-input" and a <ul> with
   id="smart-search-suggestions" inside a .suggest-wrap container.
   Usage:
     {% include "_smart_search_suggestions.html" %}
#}
<script>
(function() {
    var input = document.getElementById('smart-search-input');
    var list = document.getElementById('smart-search-suggestions');
    if (!input || !list) return;

    var activeIndex = -1;

    function render(items) {
        list.innerHTML = '';
        activeIndex = -1;
        if (!items.length) { list.style.display = 'none'; return; }
        items.forEach(function(term) {
            var li = document.createElement('li');
            li.textContent = term;
            li.addEventListener('mousedown', function(e) {
                e.preventDefault();
                input.value = term;
                list.style.display = 'none';
                input.dispatchEvent(new Event('input'));
            });
            list.appendChild(li);
        });
        list.style.display = 'block';
    }

    function flatten(data) {
        var out = [];
        if (!data || !data.suggestions) return out;
        Object.keys(data.suggestions).forEach(function(group) {
            data.suggestions[group].forEach(function(term) {
                if (out.indexOf(term) === -1) out.push(term);
            });
        });
        return out.slice(0, 12);
    }

    function fetchSuggestions() {
        var q = input.value.trim();
        if (q.length < 2) { list.style.display = 'none'; return; }
        fetch('/api/search-suggestions?query=' + encodeURIComponent(q), {
            headers: { 'Accept': 'application/json' }
        })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) { render(flatten(data)); })
            .catch(function() { list.style.display = 'none'; });
    }

    input.addEventListener('input', function() {
        clearTimeout(input._debounceTimer);
        input._debounceTimer = setTimeout(fetchSuggestions, 200);
    });
    input.addEventListener('focus', function() {
        if (input.value.trim().length >= 2) fetchSuggestions();
    });
    input.addEventListener('keydown', function(e) {
        var items = list.querySelectorAll('li');
        if (!items.length) return;
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            activeIndex = (activeIndex + 1) % items.length;
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            activeIndex = (activeIndex - 1 + items.length) % items.length;
        } else if (e.key === 'Enter' && activeIndex >= 0) {
            e.preventDefault();
            items[activeIndex].dispatchEvent(new Event('mousedown'));
            return;
        } else if (e.key === 'Escape') {
            list.style.display = 'none';
            return;
        }
        items.forEach(function(li, i) { li.classList.toggle('active', i === activeIndex); });
    });
    input.addEventListener('blur', function() {
        setTimeout(function() { list.style.display = 'none'; }, 150);
    });
    window.addEventListener('scroll', function() { list.style.display = 'none'; });
})();
</script>
