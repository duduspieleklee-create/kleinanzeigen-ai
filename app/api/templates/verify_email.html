<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Mail-Bestätigung</title>
    <meta name="description" content="Bestätige deine E-Mail-Adresse, um Suchen zu starten.">
    <link rel="stylesheet" href="/static/style.css?v={{ build_info.commit_short }}">
    <style>
        .container { max-width: 600px; margin: 40px auto; text-align: center; }
        .card { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .btn { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        .btn:hover { background: #0056b3; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .note { font-size: 0.9rem; color: #666; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>E-Mail-Bestätigung</h2>
            <p>Wir haben eine Bestätigungs-E-Mail an <strong>{{ email }}</strong> gesendet.</p>
            <p class="note">Bitte prüfe dein Postfach (inkl. Spam-Ordner), um den Bestätigungslink zu öffnen.</p>
            <a href="/auth/login" class="btn">Zurück zum Login</a>
            <a href="/auth/resend-verification" class="btn btn-secondary">Nochmal senden</a>
        </div>
    </div>
    <script type="module" src="/static/main.js?v={{ build_info.commit_short }}"></script>
</body>
</html>
