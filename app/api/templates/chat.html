<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <title>KI‑Chat</title>
    <script>
        const GREETING = `👋 Hallo! Ich bin dein KI‑Such‑Assistent.

Erzähl mir einfach, wonach du suchst — z.B.:
• „Ein gebrauchtes Eichensofa unter 200€“
• „Ein iPhone in München bis 500€“
• „Gartenmöbel, günstig“`;
    </script>
</head>
<body>
    <h1>KI‑Chat</h1>
    <div id="messages"></div>
    <form id="chatForm">
        <input type="text" id="msgInput" placeholder="Ihre Frage ..." required style="width:80%"/>
        <button type="submit">Senden</button>
    </form>
    <script>
        const form = document.getElementById('chatForm');
        const input = document.getElementById('msgInput');
        const messages = document.getElementById('messages');
        // Keep full conversation history to send to the backend
        const history = [{role: 'assistant', content: GREETING}];
        function addMessage(text, author) {
            const div = document.createElement('div');
            div.className = 'msg ' + (author==='user'?'user':'bot');
            div.textContent = (author==='user'?'Sie: ':'Bot: ') + text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        // Initialize with greeting
        addMessage(GREETING, 'bot');
        form.addEventListener('submit', async e => {
            e.preventDefault();
            const query = input.value.trim();
            if (!query) return;
            addMessage(query, 'user');
            // Append user message to history
            history.push({role: 'user', content: query});
            input.value = '';
            try {
                const resp = await fetch('/api/ai-search/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({messages: history})
                });
                const data = await resp.json();
                addMessage(data.reply, 'bot');
                // Append assistant reply to history for next turn
                history.push({role: 'assistant', content: data.reply});
            } catch (err) {
                addMessage('Fehler beim Abrufen der Antwort.', 'bot');
            }
        });
    </script>
</body>
</html>
