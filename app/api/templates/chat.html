<!DOCTYPE html>
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <title>KI‑Chat</title>
    <style>
        body {font-family: Arial, sans-serif; background:#f5f5f5; margin:0; height:100vh; display:flex; justify-content:center; align-items:center;}
        .chat-container {width: 100%; max-width: 500px; height: 90vh; background:#fff; border:1px solid #ddd; border-radius:8px; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.1);}
        .header {background:#0066cc; color:#fff; padding:0.8rem; text-align:center; font-size:1.2rem;}
        #messages {flex:1; padding:1rem; overflow-y:auto; background:#fafafa;}
        .msg {margin:0.5rem 0; max-width:80%; line-height:1.4;}
        .msg.user {align-self:flex-end; background:#0066cc; color:#fff; border-radius:12px 12px 0 12px; padding:0.6rem 0.9rem;}
        .msg.bot {align-self:flex-start; background:#e0e0e0; color:#000; border-radius:12px 12px 12px 0; padding:0.6rem 0.9rem;}
        .input-area {display:flex; padding:0.5rem; border-top:1px solid #ddd; background:#fff;}
        #msgInput {flex:1; padding:0.5rem; border:1px solid #ccc; border-radius:4px; font-size:1rem;}
        button {margin-left:0.5rem; padding:0.5rem 1rem; background:#0066cc; color:#fff; border:none; border-radius:4px; cursor:pointer;}
        button:hover {background:#0055aa;}
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">KI‑Chat</div>
        <div id="status" style="padding:0.5rem; text-align:center; font-size:0.9rem; color:#555;"></div>
        <div id="messages"></div>
        <form id="chatForm" class="input-area">
            <input type="text" id="msgInput" placeholder="Ihre Frage …" required />
            <button type="submit">Senden</button>
        </form>
    </div>
    <script>
        const GREETING = `👋 Hallo! Ich bin dein KI‑Such‑Assistent.

        Erzähl mir einfach, wonach du suchst — z.B.:
        • „Ein gebrauchtes Eichensofa unter 200€“
        • „Ein iPhone in München bis 500€“
        • „Gartenmöbel, günstig“`;
        const form = document.getElementById('chatForm');
        const input = document.getElementById('msgInput');
        const messages = document.getElementById('messages');
        const history = [{role: 'assistant', content: GREETING}];
        function addMessage(text, author) {
            const div = document.createElement('div');
            div.className = 'msg ' + (author === 'user' ? 'user' : 'bot');
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        // Show initial greeting
        addMessage(GREETING, 'bot');
        // Perform LLM health check on page load
        window.addEventListener('load', async () => {
            try {
                const resp = await fetch('/api/ai-search/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({messages: [{role: 'assistant', content: GREETING}]})
                });
                const data = await resp.json();
                const statusDiv = document.getElementById('status');
                if (data.llm_error) {
                    statusDiv.textContent = data.llm_error;
                    statusDiv.style.color = 'red';
                } else if (data.llm_connected) {
                    statusDiv.textContent = `LLM verbunden – ${data.model_name}`;
                    statusDiv.style.color = 'green';
                } else {
                    statusDiv.textContent = 'LLM nicht aktiv';
                    statusDiv.style.color = '#555';
                }
            } catch (e) {
                // ignore errors
            }
        });
        form.addEventListener('submit', async e => {
            e.preventDefault();
            const query = input.value.trim();
            if (!query) return;
            addMessage(query, 'user');
            history.push({role: 'user', content: query});
            input.value = '';
            try {
                const resp = await fetch('/api/ai-search/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({messages: history})
                });
                const data = await resp.json();
                // Update LLM status line
                const statusDiv = document.getElementById('status');
                if (data.llm_error) {
                    statusDiv.textContent = data.llm_error;
                    statusDiv.style.color = 'red';
                } else if (data.llm_connected) {
                    statusDiv.textContent = `LLM verbunden – ${data.model_name}`;
                    statusDiv.style.color = 'green';
                } else {
                    statusDiv.textContent = 'LLM nicht aktiv';
                    statusDiv.style.color = '#555';
                }
                addMessage(data.reply, 'bot');
                history.push({role: 'assistant', content: data.reply});
    </script>
</body>
</html>
